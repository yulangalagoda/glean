name: package-guard

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build the package
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Assert docs / CHARTER / _private never ship in the wheel
        run: |
          python - <<'PY'
          import zipfile, glob, sys
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          leaks = [n for n in names
                   if n.startswith("docs/") or "CHARTER" in n or n.startswith("_private/")]
          if leaks:
              print("FAIL — these must never ship in the installed wheel:")
              for n in leaks: print("   ", n)
              sys.exit(1)
          print("OK — wheel is clean. Contents:")
          for n in names: print("   ", n)
          PY
